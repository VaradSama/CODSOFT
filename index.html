<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS — Tic-Tac-Toe AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient background layers -->
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- ═══════════════════════════════ MAIN APP ═══════════════════════════════ -->
  <main class="app" id="app">

    <!-- HEADER -->
    <header class="header" role="banner">
      <div class="header-badge">
        <span class="badge-dot"></span>
        <span class="badge-text">AI · Minimax + α-β Pruning</span>
      </div>
      <h1 class="header-title">
        <span class="title-word title-word--1">NEX</span><span class="title-word title-word--2">US</span>
      </h1>
      <p class="header-sub">An unbeatable adversarial intelligence</p>
    </header>

    <!-- CONTROLS -->
    <section class="controls-panel glass-card" aria-label="Game settings">
      <div class="control-group">
        <label class="control-label" for="difficulty">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M6 3.5V6.5L7.5 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Difficulty
        </label>
        <div class="select-wrapper">
          <select id="difficulty" class="control-select">
            <option value="easy">Easy — Random</option>
            <option value="medium">Medium — Depth 3</option>
            <option value="hard" selected>Hard — Unbeatable</option>
          </select>
          <svg class="select-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="control-divider" aria-hidden="true"></div>

      <div class="control-group">
        <label class="control-label" for="humanSymbol">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <circle cx="6" cy="4" r="2.2" stroke="currentColor" stroke-width="1.2"/>
            <path d="M1.5 10.5C1.5 8.567 3.567 7 6 7s4.5 1.567 4.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Play as
        </label>
        <div class="symbol-toggle" role="group" aria-label="Choose your symbol">
          <button class="symbol-btn active" id="btn-X" data-symbol="X" aria-pressed="true">
            <span class="symbol-btn-mark x-mark">✕</span>
            <span>X — First</span>
          </button>
          <button class="symbol-btn" id="btn-O" data-symbol="O" aria-pressed="false">
            <span class="symbol-btn-mark o-mark">◯</span>
            <span>O — Second</span>
          </button>
        </div>
      </div>
    </section>

    <!-- STATUS -->
    <div class="status-panel glass-card" id="statusPanel" role="status" aria-live="polite">
      <div class="status-indicator" id="statusIndicator">
        <div class="pulse-ring" id="pulseRing"></div>
        <div class="status-dot" id="statusDot"></div>
      </div>
      <div class="status-content">
        <p class="status-main" id="statusMain">Your turn</p>
        <p class="status-hint" id="statusHint">Click any cell to place your mark</p>
      </div>
      <div class="status-mode" id="statusMode">
        <span id="modeLabel">Hard</span>
      </div>
    </div>

    <!-- GAME BOARD -->
    <section class="board-section" aria-label="Game board">
      <div class="board-frame glass-card">
        <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe grid">
          <!-- Cells injected by JS -->
        </div>
        <!-- Win line overlay (drawn by JS) -->
        <svg class="win-line-svg" id="winLineSvg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <line id="winLine" x1="0" y1="0" x2="0" y2="0" stroke="transparent" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
    </section>

    <!-- SCOREBOARD -->
    <section class="scoreboard glass-card" aria-label="Score">
      <div class="score-tile" id="tile-human">
        <p class="score-tile-label" id="humanLabel">You · X</p>
        <p class="score-tile-val" id="score-human">0</p>
        <div class="score-tile-bar" id="bar-human"></div>
      </div>
      <div class="score-tile score-tile--center">
        <p class="score-tile-label">Draws</p>
        <p class="score-tile-val score-tile-val--neutral" id="score-draw">0</p>
        <div class="score-tile-bar score-tile-bar--neutral" id="bar-draw"></div>
      </div>
      <div class="score-tile" id="tile-ai">
        <p class="score-tile-label" id="aiLabel">AI · O</p>
        <p class="score-tile-val score-tile-val--ai" id="score-ai">0</p>
        <div class="score-tile-bar score-tile-bar--ai" id="bar-ai"></div>
      </div>
    </section>

    <!-- ACTIONS -->
    <div class="action-row">
      <button class="btn btn--primary" id="restartBtn" aria-label="Start new game">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 7A5 5 0 1 0 7 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M7 2L4.5 4.5M7 2L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        New Game
      </button>
      <button class="btn btn--ghost" id="resetScoreBtn" aria-label="Reset score">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Reset Score
      </button>
    </div>

    <!-- FOOTER -->
    <footer class="footer" role="contentinfo">
      <span>Varad</span>
      <span class="footer-dot" aria-hidden="true">·</span>
      <span>MCA Cybersecurity</span>
      <span class="footer-dot" aria-hidden="true">·</span>
      <span>IIMS Chinchwad</span>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
